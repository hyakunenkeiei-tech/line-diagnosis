<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>生年月日からみる性質診断（日干支60種版）</title>
  <style>
    body {
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      background: #f8f7f4;
      color: #333;
      margin: 0;
      padding: 24px;
      line-height: 1.8;
    }
    .container {
      max-width: 760px;
      margin: 0 auto;
      background: #fff;
      padding: 28px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    h1 {
      font-size: 1.8rem;
      margin-top: 0;
      margin-bottom: 12px;
      color: #5b4b3a;
    }
    .lead {
      margin-top: 0;
      color: #666;
    }
    .form-group {
      margin: 20px 0;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }
    input[type="date"] {
      width: 100%;
      max-width: 260px;
      padding: 10px 12px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fff;
      box-sizing: border-box;
    }
    button {
      margin-top: 12px;
      padding: 12px 20px;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      background: #8a6d52;
      color: #fff;
      cursor: pointer;
    }
    button:hover { opacity: 0.9; }
    .message {
      margin-top: 14px;
      color: #b00020;
      font-weight: bold;
    }
    .result {
      margin-top: 28px;
      padding: 20px;
      background: #fcfaf7;
      border: 1px solid #eee4d8;
      border-radius: 12px;
      display: none;
    }
    .result h2 {
      margin-top: 0;
      color: #5b4b3a;
      font-size: 1.4rem;
    }
    .item { margin-bottom: 12px; }
    .label {
      font-weight: bold;
      color: #6a533f;
    }
    ul {
      margin-top: 6px;
      padding-left: 1.2em;
    }
    .notes {
      margin-top: 24px;
      font-size: 0.95rem;
      color: #666;
    }
    .headline-box {
      margin: 10px 0 18px;
      padding: 12px 14px;
      background: #f3ede6;
      border-radius: 10px;
      color: #5b4b3a;
      font-weight: bold;
    }
    .profile-box {
      margin: 10px 0 18px;
      padding: 14px;
      background: #fff;
      border: 1px solid #eee4d8;
      border-radius: 10px;
    }
    .sublist {
      margin-top: 4px;
      color: #555;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>生年月日からみる性質診断</h1>
    <p class="lead">
      生年月日をもとに、あなたの行動タイプ・思考タイプ・対人傾向をやさしく診断します。<br>
      （日干支ベース / 日本時間 / 00:00切り替え）
    </p>

    <div class="form-group">
      <label for="birthdate">生年月日を入力してください</label>
      <input type="date" id="birthdate" />
      <br>
      <button id="diagnoseBtn">診断する</button>
      <div id="message" class="message"></div>
    </div>

    <div id="result" class="result">
      <h2>診断結果</h2>

      <div class="headline-box" id="headline"></div>
      <div class="profile-box" id="profile"></div>

      <div class="item"><span class="label">日干：</span><span id="nikkan"></span></div>
      <div class="item"><span class="label">日干支：</span><span id="kanshi"></span></div>
      <div class="item"><span class="label">五行タイプ：</span><span id="gogyo"></span></div>
      <div class="item"><span class="label">行動タイプ：</span><span id="behavior"></span></div>
      <div class="item"><span class="label">思考タイプ：</span><span id="thinking"></span></div>
      <div class="item"><span class="label">対人傾向：</span><span id="relationship"></span></div>

      <div class="item">
        <span class="label">強み：</span>
        <ul id="strengths"></ul>
      </div>

      <div class="item"><span class="label">注意点：</span><span id="caution"></span></div>
      <div class="item"><span class="label">アドバイス：</span><span id="advice"></span></div>

      <div class="item sublist" id="detailNote"></div>
    </div>

    <div class="notes">
      ※ 日干支60種類で判定しています。<br>
      ※ 日本時間の暦日を使い、日替わりは00:00です。<br>
      ※ 年柱・月柱・節入り判定はまだ入れていません。<br>
      ※ データファイル名は <code>rokkujikkanshi_app_data.json</code> のままにしてください。
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
